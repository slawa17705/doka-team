<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка | Дока-Тим</title>
    <link rel="canonical" href="https://doka-team.ru/DOKA-QR.html">
    <meta name="description" content="Оставить заявку на ремонт или строительство. Дока-Тим (DOKA-TEAM) — Москва и МО.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .form-container h2 {
            font-size: 24px;
            color: #222;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .form-container input,
        .form-container textarea {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            color: #222;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .form-container input:focus,
        .form-container textarea:focus {
            border-color: #d4af37;
        }

        .form-container button {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .form-container button:hover {
            background: #c49b2c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .form-container button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #result {
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        #result.success {
            color: #2c7a2c;
        }

        #result.error {
            color: #e74c3c;
        }

        .site-link {
            display: none;
            margin-top: 15px;
        }

        .site-link.show {
            display: block;
        }

        .site-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 700;
        }

        .site-link a:hover {
            text-decoration: underline;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            width: 120px;
            height: auto;
        }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Заявка | Дока-Тим",
      "description": "Форма быстрой заявки на ремонт и строительство от бригады Дока-Тим в Москве и МО.",
      "url": "https://doka-team.ru/DOKA-QR.html",
      "about": {
        "@type": "Organization",
        "name": "Дока-Тим (DOKA-TEAM)",
        "url": "https://doka-team.ru"
      }
    }
    </script>
</head>

<body>
    <div class="form-container">
        <div class="logo">
            <img src="image/logoDT3.png" alt="DOKA-TEAM">
        </div>
        <h2>Оставить заявку</h2>

        <form id="form">
            <input type="text" name="name" id="name" placeholder="Имя" required>
            <input type="tel" name="phone" id="phone" placeholder="+7 (999) 123-45-67" required>
            <textarea name="comment" id="comment" placeholder="Комментарий" rows="3"></textarea>
            <button type="submit" id="submitBtn">Отправить</button>
        </form>

        <p id="result"></p>
        <p id="siteLink" class="site-link">← <a href="https://doka-team.ru">Вернуться на сайт</a></p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwCzTKZ27WYmZf9F6eCO36Uajv803jRQlR9AVKyWLWrKYlsE736s79DzirNK5tk0Bg7/exec';

        const form = document.getElementById('form');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const siteLink = document.getElementById('siteLink');
        const phoneInput = document.getElementById('phone');

        phoneInput.addEventListener('input', function (e) {
            let val = this.value.replace(/\D/g, '');
            if (val.length === 11 && val.startsWith('8')) val = '7' + val.slice(1);
            if (val.length > 11) val = val.slice(0, 11);
            let formatted = '+7';
            if (val.length > 1) formatted += ' (' + val.slice(1, 4);
            if (val.length >= 4) formatted += ') ' + val.slice(4, 7);
            if (val.length >= 7) formatted += '-' + val.slice(7, 9);
            if (val.length >= 9) formatted += '-' + val.slice(9, 11);
            this.value = formatted;
        });

        function isValidPhone(phone) {
            const cleaned = phone.replace(/\D/g, '');
            return cleaned.length === 11 && (cleaned.startsWith('7') || cleaned.startsWith('8'));
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const comment = document.getElementById('comment').value.trim();

            if (!name) {
                result.innerHTML = 'Введите имя';
                result.className = 'error';
                return;
            }

            if (!isValidPhone(phone)) {
                result.innerHTML = 'Введите номер в формате +7 (999) 123-45-67';
                result.className = 'error';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';

            fetch(scriptURL, {
                method: 'POST',
                body: new FormData(form)
            })
                .then(response => response.json())
                .then(data => {
                    result.innerHTML = 'Заявка принята. Номер: ' + data.id;
                    result.className = 'success';
                    siteLink.classList.add('show');
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Отправить';
                })
                .catch(error => {
                    result.innerHTML = 'Ошибка отправки. Попробуйте ещё раз.';
                    result.className = 'error';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Отправить';
                });
        });
    </script>
</body>

</html>
